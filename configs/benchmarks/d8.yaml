# d=8 benchmark: small system
name: d8

system:
  x_dim: 8
  u_dim: 3
  s_A: 2
  s_B: 1
  a_scale: 1.0
  b_scale: 1.0
  coeff_lower: 0.1
  max_instability: 1.0

simulation:
  T: 1.4
  dt: 0.04
  sigma: 0.3
  x0_std: 0.0

cost:
  q_scale: 1.0
  r_scale: 1.0

training:
  max_episodes: 120
  n_seeds: 12

agents:
  - oracle
  - dense_greedy
  - dense_excited
  - sparse_greedy
  - sparse_excited

estimation:
  lambda_lasso: null #0.02
  c_lambda: 0.02
  delta: 0.05
  mu_ridge: 0.02
  lasso_max_iter: 5000
  lasso_tol: 1.0e-4

excitation:
  sigma_u: 0.10
